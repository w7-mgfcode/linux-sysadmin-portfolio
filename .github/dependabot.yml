version: 2
updates:
  # Keep GitHub Actions used by the CI workflow up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

  # Keep Docker base images (Dockerfile FROM lines) across all projects current.
  - package-ecosystem: "docker"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "docker"
