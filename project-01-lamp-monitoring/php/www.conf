[www]
; Run pool as phpuser
user = phpuser
group = phpuser

; Listen on port 9000
listen = 9000

; Process manager settings
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Ensure proper permissions
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
